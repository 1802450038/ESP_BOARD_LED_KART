<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Master LED</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; }
        .container { max-width: 700px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h2 { color: #0d6efd; border-bottom: 2px solid #e9ecef; padding-bottom: 15px; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        
        /* Estilos de Caixas e Layout */
        .section-box { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 20px; margin-bottom: 25px; }
        .row { display: flex; gap: 15px; margin-bottom: 15px; }
        .col { flex: 1; display: flex; flex-direction: column; }
        .col-small { flex: 0 0 80px; } /* Coluna pequena para números */
        
        /* Etiquetas e Inputs */
        label { font-weight: 600; font-size: 0.85em; color: #495057; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.5px; }
        input, button { padding: 12px; border: 1px solid #ced4da; border-radius: 6px; font-size: 1em; transition: 0.2s; }
        input:focus { border-color: #86b7fe; outline: none; box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.25); }
        
        /* Botões */
        button { border: none; cursor: pointer; font-weight: bold; color: white; margin-top: 5px; }
        .btn-green { background-color: #198754; }
        .btn-green:hover { background-color: #157347; }
        .btn-blue { background-color: #0d6efd; }
        .btn-blue:hover { background-color: #0b5ed7; }
        .btn-red { background-color: #dc3545; padding: 6px 12px; font-size: 0.9em; width: auto; }
        
        /* Tabela */
        table { width: 100%; border-collapse: separate; border-spacing: 0; margin-top: 10px; border: 1px solid #dee2e6; border-radius: 8px; overflow: hidden; }
        th { background: #e9ecef; color: #495057; padding: 12px; text-align: left; font-size: 0.9em; }
        td { padding: 12px; border-top: 1px solid #dee2e6; font-size: 0.95em; }
        tr:first-child td { border-top: none; }
    </style>
</head>
<body>

<div class="container">
    <h2>📡 Gerenciar Placas (Slaves)</h2>
    
    <div class="section-box">
        <div class="row">
            <div class="col col-small">
                <label for="slaveId">ID</label>
                <input type="number" id="slaveId" placeholder="1">
            </div>
            <div class="col">
                <label for="slaveMac">Endereço MAC</label>
                <input type="text" id="slaveMac" placeholder="FF:FF:FF:FF:FF:FF" maxlength="17">
            </div>
        </div>
        <button class="btn-green" style="width: 100%;" onclick="saveSlave()">SALVAR SLAVE</button>
    </div>

    <table>
        <thead>
            <tr><th width="15%">ID</th><th>MAC Cadastrado</th><th width="20%">Ação</th></tr>
        </thead>
        <tbody id="slaveTable"></tbody>
    </table>
</div>

<div class="container" style="margin-top: 30px;">
    <h2>💬 Enviar Mensagem</h2>
    <div class="section-box">
        
        <div class="row">
            <div class="col col-small">
                <label for="msgId">Destino</label>
                <input type="number" id="msgId" value="0" title="0 = Enviar para Todos">
            </div>
            <div class="col">
                <label for="msgText">Mensagem de Texto</label>
                <input type="text" id="msgText" placeholder="Digite sua mensagem aqui...">
            </div>
        </div>

        <div class="row">
            <div class="col">
                <label for="msgX">Posição X</label>
                <input type="number" id="msgX" value="0">
            </div>
            <div class="col">
                <label for="msgY">Posição Y</label>
                <input type="number" id="msgY" value="8">
            </div>
            <div class="col">
                <label for="msgSize">Tamanho</label>
                <input type="number" id="msgSize" value="1" min="1" max="5">
            </div>
            <div class="col">
                <label for="msgColor">Cor do Texto</label>
                <input type="color" id="msgColor" value="#00FF00" style="height: 45px; padding: 2px;">
            </div>
        </div>

        <button class="btn-blue" style="width: 100%;" onclick="sendMessage()">ENVIAR MENSAGEM</button>
    </div>
</div>

<script>
    window.onload = loadSlaves;

    async function loadSlaves() {
        try {
            const res = await fetch('/api/slaves');
            const data = await res.json();
            const tbody = document.getElementById('slaveTable');
            tbody.innerHTML = '';
            
            data.sort((a,b) => a.id - b.id).forEach(slave => {
                tbody.innerHTML += `
                    <tr>
                        <td><strong>${slave.id}</strong></td>
                        <td>${slave.mac}</td>
                        <td style="text-align: center;"><button class="btn-red" onclick="deleteSlave(${slave.id})">Remover</button></td>
                    </tr>`;
            });
        } catch(e) { console.error("Erro loading", e); }
    }

    async function saveSlave() {
        const id = document.getElementById('slaveId').value;
        const mac = document.getElementById('slaveMac').value;
        if(!id || !mac) return alert("Preencha ID e MAC");

        await fetch('/api/add_slave', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: parseInt(id), mac: mac })
        });
        document.getElementById('slaveId').value = '';
        document.getElementById('slaveMac').value = '';
        loadSlaves();
    }

    async function deleteSlave(id) {
        if(!confirm("Remover ID " + id + "?")) return;
        await fetch('/api/remove_slave', {
            method: 'POST',
            body: JSON.stringify({ id: parseInt(id) })
        });
        loadSlaves();
    }

    async function sendMessage() {
        const payload = [{
            id: parseInt(document.getElementById('msgId').value),
            text: document.getElementById('msgText').value,
            x: parseInt(document.getElementById('msgX').value),
            y: parseInt(document.getElementById('msgY').value),
            size: parseInt(document.getElementById('msgSize').value),
            color: document.getElementById('msgColor').value
        }];
        await fetch('/api/send', { method: 'POST', body: JSON.stringify(payload) });
        alert("Comando Enviado!");
    }
</script>

</body>
</html>
