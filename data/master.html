<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Master LED</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; max-width: 900px; margin: 0 auto; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e9ecef; margin-bottom: 20px;}
        .card.master { border-left: 5px solid #0d6efd; }
        .card.slave { border-left: 5px solid #198754; }
        h3 { font-size: 1.1em; color: #555; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; display: flex; justify-content: space-between; }
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        .col { flex: 1; }
        label { font-size: 0.75em; font-weight: bold; text-transform: uppercase; color: #6c757d; display: block; margin-bottom: 2px; }
        input { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 5px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; margin-top: 5px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-blue { background: #0d6efd; }
        .btn-green { background: #198754; }
        .btn-red { background: #dc3545; width: auto; font-size: 0.8em; padding: 4px 10px; }
        
        /* Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; vertical-align: middle; margin-right: 10px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #0d6efd; }
        input:checked + .slider:before { transform: translateX(20px); }
        
        /* Toast */
        #toast { visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center; border-radius: 5px; padding: 16px; position: fixed; z-index: 1; left: 50%; bottom: 30px; transform: translateX(-50%); font-size: 17px; }
        #toast.show { visibility: visible; -webkit-animation: fadein 0.5s, fadeout 0.5s 2.5s; animation: fadein 0.5s, fadeout 0.5s 2.5s; }
        @-webkit-keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @keyframes fadein { from {bottom: 0; opacity: 0;} to {bottom: 30px; opacity: 1;} }
        @-webkit-keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
        @keyframes fadeout { from {bottom: 30px; opacity: 1;} to {bottom: 0; opacity: 0;} }
    </style>
</head>
<body>

<div id="toast">Ação Realizada</div>

<div class="card">
    <h3>📡 Novo Slave</h3>
    <div class="row">
        <div class="col" style="flex: 0 0 80px;"><label>ID</label><input type="number" id="newId" placeholder="1"></div>
        <div class="col"><label>MAC Address</label><input type="text" id="newMac" placeholder="FF:FF:FF:FF:FF:FF" maxlength="17"></div>
        <div class="col" style="flex: 0 0 100px; display:flex; align-items:flex-end;"><button class="btn-green" onclick="saveSlave()">Salvar</button></div>
    </div>
</div>

<div id="cardsContainer"></div>

<script>
    // Funções no escopo global para evitar "is not defined"
    window.onload = loadSlaves;
    let slavesData = [];

    function showToast(msg) {
        var x = document.getElementById("toast");
        x.innerText = msg;
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
    }

    async function loadSlaves() {
        try {
            const res = await fetch('/api/slaves');
            slavesData = await res.json();
            renderCards();
        } catch(e) { console.error(e); }
    }

    async function saveSlave() {
        const id = document.getElementById('newId').value;
        const mac = document.getElementById('newMac').value;
        if(!id || !mac) return showToast("Preencha tudo!");

        await fetch('/api/add_slave', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: parseInt(id), mac: mac })
        });
        document.getElementById('newId').value = '';
        document.getElementById('newMac').value = '';
        loadSlaves();
        showToast("Slave Salvo!");
    }

    async function deleteSlave(id) {
        if(!confirm("Remover ID " + id + "?")) return;
        await fetch('/api/remove_slave', { method: 'POST', body: JSON.stringify({ id: parseInt(id) }) });
        loadSlaves();
        showToast("Removido!");
    }

    function renderCards() {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';

        // Master Card
        let masterHTML = `
        <div class="card master">
            <h3><span>👑 Master (ID 0)</span>
                <div style="font-size:0.8em; display:flex; align-items:center;">
                    <label class="switch"><input type="checkbox" id="sendToAll"><span class="slider"></span></label>
                    Enviar p/ Todos
                </div>
            </h3>
            ${getFormHTML(0)}
            <button class="btn-blue" onclick="sendFromCard(0)">ENVIAR (MASTER)</button>
        </div>`;
        container.innerHTML += masterHTML;

        // Slave Cards
        slavesData.sort((a,b) => a.id - b.id).forEach(slave => {
            container.innerHTML += `
            <div class="card slave">
                <h3><span>📟 Slave ID ${slave.id} <small>(${slave.mac})</small></span>
                    <button class="btn-red" onclick="deleteSlave(${slave.id})">X</button></h3>
                ${getFormHTML(slave.id)}
                <button class="btn-green" onclick="sendFromCard(${slave.id})">ENVIAR PARA ID ${slave.id}</button>
            </div>`;
        });
    }

    function getFormHTML(id) {
        return `
        <div class="row"><div class="col"><label>Texto</label><input type="text" id="text-${id}" placeholder="Mensagem..."></div></div>
        <div class="row">
            <div class="col"><label>X</label><input type="number" id="x-${id}" value="0"></div>
            <div class="col"><label>Y</label><input type="number" id="y-${id}" value="8"></div>
            <div class="col"><label>Tam</label><input type="number" id="size-${id}" value="1"></div>
            <div class="col"><label>Cor</label><input type="color" id="color-${id}" value="#00FF00" style="height:38px; padding:0;"></div>
        </div>`;
    }

    async function sendFromCard(id) {
        const text = document.getElementById(`text-${id}`).value;
        const x = parseInt(document.getElementById(`x-${id}`).value);
        const y = parseInt(document.getElementById(`y-${id}`).value);
        const size = parseInt(document.getElementById(`size-${id}`).value);
        const color = document.getElementById(`color-${id}`).value;

        let payload = [];
        // Se for Master e o switch estiver ligado
        if (id === 0 && document.getElementById('sendToAll').checked) {
            payload.push({ id: 0, text, x, y, size, color }); // Master
            slavesData.forEach(s => payload.push({ id: s.id, text, x, y, size, color })); // Slaves
            showToast("Enviando para TODOS...");
        } else {
            payload.push({ id: id, text, x, y, size, color });
            showToast("Enviando...");
        }

        await fetch('/api/send', { method: 'POST', body: JSON.stringify(payload) });
    }
</script>

</body>
</html>
