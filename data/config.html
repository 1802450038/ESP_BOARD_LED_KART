<!DOCTYPE html>
<html>
<head>
  <title>Configuracao LED</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body { font-family: sans-serif; padding: 20px; max-width: 400px; margin: 0 auto; }
    input, select, button { width: 100%; padding: 10px; margin: 5px 0; }
    button { background-color: #007bff; color: white; border: none; }
  </style>
</head>
<body>
  <h2>Configuracao Inicial</h2>
  <form action="/save_config" method="POST">
    <label>Modo de Operacao:</label>
    <select name="role" id="role" onchange="toggleWifi()">
      <option value="slave">Slave (Escravo)</option>
      <option value="master">Master (Controlador)</option>
    </select>
    
    <div id="wifi_config" style="display:none;">
      <label>Nome do WiFi (SSID):</label>
      <input type="text" name="ssid" placeholder="SSID da sua rede">
      <label>Senha do WiFi:</label>
      <input type="password" name="pass" placeholder="Senha">
    </div>

    <button type="submit">Salvar e Reiniciar</button>
  </form>

  <script>
    function toggleWifi() {
      var role = document.getElementById("role").value;
      var wifiDiv = document.getElementById("wifi_config");
      // Se for Master, mostra config wifi. Se for Slave, esconde (pois usa ESP-NOW direto ou config auto)
      // Nota: Master precisa de WiFi para servir a pagina de controle.
      wifiDiv.style.display = (role === "master") ? "block" : "none";
    }
  </script>
</body>
</html>
