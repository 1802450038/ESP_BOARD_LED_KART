<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Painel Master LED</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #f4f6f9; padding: 20px; color: #333; max-width: 900px; margin: 0 auto; }
        
        /* Layout */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(350px, 1fr)); gap: 20px; margin-top: 20px; }
        
        /* Cards */
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e9ecef; }
        .card.master { border-left: 5px solid #0d6efd; }
        .card.slave { border-left: 5px solid #198754; }
        
        h2, h3 { margin-top: 0; display: flex; align-items: center; justify-content: space-between; }
        h3 { font-size: 1.1em; color: #555; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }

        /* Inputs */
        .row { display: flex; gap: 8px; margin-bottom: 10px; }
        .col { flex: 1; }
        label { font-size: 0.75em; font-weight: bold; text-transform: uppercase; color: #6c757d; display: block; margin-bottom: 2px; }
        input { width: 100%; padding: 8px; border: 1px solid #ced4da; border-radius: 5px; box-sizing: border-box; }
        
        /* Botões */
        button { width: 100%; padding: 10px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; color: white; margin-top: 5px; transition: 0.2s; }
        button:hover { opacity: 0.9; }
        .btn-blue { background: #0d6efd; }
        .btn-green { background: #198754; }
        .btn-red { background: #dc3545; width: auto; font-size: 0.8em; padding: 4px 10px; }
        
        /* Toast Notification */
        #toast {
            visibility: hidden; min-width: 250px; background-color: #333; color: #fff; text-align: center;
            border-radius: 5px; padding: 16px; position: fixed; z-index: 1; left: 50%; bottom: 30px; transform: translateX(-50%);
            font-size: 17px; opacity: 0; transition: opacity 0.5s, bottom 0.5s;
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 50px; }
        
        /* Toggle Switch */
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: #0d6efd; }
        input:checked + .slider:before { transform: translateX(20px); }
        .toggle-label { display: flex; align-items: center; gap: 10px; font-size: 0.9em; font-weight: bold; margin-bottom: 10px; }

    </style>
</head>
<body>

<div id="toast">Comando Enviado!</div>

<div class="card" style="margin-bottom: 30px;">
    <h3>📡 Cadastrar Novo Slave</h3>
    <div class="row">
        <div class="col" style="flex: 0 0 80px;">
            <label>ID</label><input type="number" id="newId" placeholder="1">
        </div>
        <div class="col">
            <label>MAC Address</label><input type="text" id="newMac" placeholder="FF:FF:FF:FF:FF:FF" maxlength="17">
        </div>
        <div class="col" style="flex: 0 0 100px; display: flex; align-items: flex-end;">
            <button class="btn-green" onclick="saveSlave()">Cadastrar</button>
        </div>
    </div>
</div>

<div id="cardsContainer" class="grid-container">
    </div>

<script>
    let slavesData = [];

    window.onload = loadSlaves;

    // Toast Function (Substitui Alert)
    function showToast(msg) {
        const x = document.getElementById("toast");
        x.innerText = msg;
        x.className = "show";
        setTimeout(function(){ x.className = x.className.replace("show", ""); }, 3000);
    }

    async function loadSlaves() {
        try {
            const res = await fetch('/api/slaves');
            slavesData = await res.json();
            renderCards();
        } catch(e) { console.error(e); }
    }

    async function saveSlave() {
        const id = document.getElementById('newId').value;
        const mac = document.getElementById('newMac').value;
        if(!id || !mac) return showToast("Preencha ID e MAC");

        await fetch('/api/add_slave', {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({ id: parseInt(id), mac: mac })
        });
        document.getElementById('newId').value = '';
        document.getElementById('newMac').value = '';
        loadSlaves();
        showToast("Slave Salvo!");
    }

    async function deleteSlave(id) {
        if(!confirm("Remover ID " + id + "?")) return;
        await fetch('/api/remove_slave', { method: 'POST', body: JSON.stringify({ id: parseInt(id) }) });
        loadSlaves();
        showToast("Removido!");
    }

    // --- RENDERIZAÇÃO DINÂMICA ---
    function renderCards() {
        const container = document.getElementById('cardsContainer');
        container.innerHTML = '';

        // 1. Cria Card do MASTER (ID 0)
        let masterHTML = `
        <div class="card master">
            <h3>
                <span>👑 Master (ID 0)</span>
            </h3>
            <div class="toggle-label">
                <label class="switch">
                    <input type="checkbox" id="sendToAll">
                    <span class="slider"></span>
                </label>
                <span>Enviar para TODOS</span>
            </div>
            ${getFormHTML(0)}
            <button class="btn-blue" onclick="sendFromCard(0)">ENVIAR (MASTER)</button>
        </div>`;
        container.innerHTML += masterHTML;

        // 2. Cria Cards dos Slaves
        slavesData.sort((a,b) => a.id - b.id).forEach(slave => {
            let slaveHTML = `
            <div class="card slave">
                <h3>
                    <span>📟 Slave ID ${slave.id}</span>
                    <button class="btn-red" onclick="deleteSlave(${slave.id})">X</button>
                </h3>
                <div style="font-size:0.8em; color:#666; margin-bottom:10px;">MAC: ${slave.mac}</div>
                ${getFormHTML(slave.id)}
                <button class="btn-green" onclick="sendFromCard(${slave.id})">ENVIAR (SLAVE ${slave.id})</button>
            </div>`;
            container.innerHTML += slaveHTML;
        });
    }

    // Gera o HTML dos inputs usando o ID para criar ids únicos (ex: text-1, text-0)
    function getFormHTML(id) {
        return `
        <div class="row">
            <div class="col"><label>Texto</label><input type="text" id="text-${id}" placeholder="Msg..."></div>
        </div>
        <div class="row">
            <div class="col"><label>X</label><input type="number" id="x-${id}" value="0"></div>
            <div class="col"><label>Y</label><input type="number" id="y-${id}" value="8"></div>
            <div class="col"><label>Tam</label><input type="number" id="size-${id}" value="1" min="1" max="5"></div>
            <div class="col"><label>Cor</label><input type="color" id="color-${id}" value="#00FF00" style="height:38px; padding:2px;"></div>
        </div>`;
    }

    async function sendFromCard(id) {
        const text = document.getElementById(`text-${id}`).value;
        const x = parseInt(document.getElementById(`x-${id}`).value);
        const y = parseInt(document.getElementById(`y-${id}`).value);
        const size = parseInt(document.getElementById(`size-${id}`).value);
        const color = document.getElementById(`color-${id}`).value;

        let payload = [];

        // Lógica de "Enviar para Todos" (Só funciona no Card do Master ID 0)
        if (id === 0 && document.getElementById('sendToAll').checked) {
            // Adiciona Master
            payload.push({ id: 0, text, x, y, size, color });
            // Adiciona todos os Slaves
            slavesData.forEach(s => {
                payload.push({ id: s.id, text, x, y, size, color });
            });
            showToast("Enviando para TODOS...");
        } else {
            // Envio Individual
            payload.push({ id: id, text, x, y, size, color });
            showToast(`Enviando para ID ${id}...`);
        }

        await fetch('/api/send', { method: 'POST', body: JSON.stringify(payload) });
    }
</script>

</body>
</html>
